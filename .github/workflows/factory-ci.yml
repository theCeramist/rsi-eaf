name: Factory CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run factory core tests
        run: python -m pytest tests/test_core.py -q
      - name: Revenue surfaces lint
        run: |
          test -f docs/REVENUE_SURFACES.md
          python -c "import factory_core.cycle_runner; import tools.nexus_bridge; print('imports ok')"