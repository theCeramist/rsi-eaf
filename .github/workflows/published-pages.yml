name: Published Surfaces (GitHub Pages)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "published/**"
      - ".github/workflows/published-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: published-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: published
      - id: deployment
        uses: actions/deploy-pages@v4